name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA check
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN must be a fine-grained or classic PAT on
          # the bot/maintainer account with repo-scope contents:write access
          # to the SIGNATURE_REPO below. Stored as a repo secret.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          # Maintainers + bots that don't need to sign.
          allowlist: berengamble,dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: 'Thanks for your contribution! Before we can merge, we need you to sign the [CLA](https://github.com/${{ github.repository }}/blob/main/CLA.md). Comment exactly "I have read the CLA Document and I hereby sign the CLA" on this PR to sign.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
